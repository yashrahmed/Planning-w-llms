<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drive Demo (Three.js)</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #10151f;
        color: #f5f7fb;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          "Courier New", monospace;
      }

      #hud {
        position: fixed;
        top: 12px;
        left: 12px;
        padding: 10px 12px;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        line-height: 1.45;
        font-size: 13px;
        white-space: pre-line;
      }
    </style>
  </head>
  <body>
    <div id="hud">Initializing...</div>
    <script type="module">
      import * as THREE from "https://unpkg.com/three@0.179.1/build/three.module.js";

      // Simulation config mirrors the drive demo assumptions.
      const config = {
        fromName: "Point A",
        toName: "Point B",
        distanceMiles: 30,
        speedMph: 60,
        fuelGallons: 1,
        mpg: 20,
        milesToWorldUnits: 0.5,
        timeScale: 240, // 240x faster than real time (30 min trip plays in ~7.5s)
      };

      const speedMilesPerSecond = config.speedMph / 3600;
      const totalRangeMiles = config.fuelGallons * config.mpg;
      const targetUnits = config.distanceMiles * config.milesToWorldUnits;
      const maxUnitsByFuel = totalRangeMiles * config.milesToWorldUnits;

      let fuelLeftGallons = config.fuelGallons;
      let distanceTraveledMiles = 0;
      let elapsedSeconds = 0;
      let done = false;
      let failed = false;

      const hud = document.getElementById("hud");
      if (!hud) throw new Error("HUD container missing.");

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x10151f);

      const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
      camera.position.set(0, 18, 36);
      camera.lookAt(0, 0, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      const hemi = new THREE.HemisphereLight(0xffffff, 0x1f2937, 1.2);
      scene.add(hemi);
      const dir = new THREE.DirectionalLight(0xffffff, 1);
      dir.position.set(10, 20, 8);
      scene.add(dir);

      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(400, 120),
        new THREE.MeshStandardMaterial({ color: 0x17202f, roughness: 0.98, metalness: 0.02 })
      );
      ground.rotation.x = -Math.PI / 2;
      scene.add(ground);

      const road = new THREE.Mesh(
        new THREE.PlaneGeometry(targetUnits + 8, 6),
        new THREE.MeshStandardMaterial({ color: 0x252a36, roughness: 1 })
      );
      road.rotation.x = -Math.PI / 2;
      road.position.y = 0.01;
      road.position.x = targetUnits / 2;
      scene.add(road);

      const lane = new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(0, 0.02, 0),
          new THREE.Vector3(targetUnits, 0.02, 0),
        ]),
        new THREE.LineBasicMaterial({ color: 0xf8fafc })
      );
      scene.add(lane);

      const markerMaterial = new THREE.MeshStandardMaterial({ color: 0x60a5fa });
      const startMarker = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 1.2, 16), markerMaterial);
      startMarker.position.set(0, 0.6, -2.8);
      scene.add(startMarker);

      const endMarker = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 1.2, 16), markerMaterial);
      endMarker.position.set(targetUnits, 0.6, -2.8);
      scene.add(endMarker);

      const car = new THREE.Mesh(
        new THREE.BoxGeometry(2.2, 1.1, 1.2),
        new THREE.MeshStandardMaterial({ color: 0xef4444, roughness: 0.6, metalness: 0.1 })
      );
      car.position.set(0, 0.65, 0);
      scene.add(car);

      const wheelGeo = new THREE.CylinderGeometry(0.32, 0.32, 0.24, 18);
      const wheelMat = new THREE.MeshStandardMaterial({ color: 0x0f172a });
      const wheelOffsets = [
        [0.75, 0.33, 0.55],
        [0.75, 0.33, -0.55],
        [-0.75, 0.33, 0.55],
        [-0.75, 0.33, -0.55],
      ];
      for (const [x, y, z] of wheelOffsets) {
        const wheel = new THREE.Mesh(wheelGeo, wheelMat);
        wheel.rotation.z = Math.PI / 2;
        wheel.position.set(x, y, z);
        car.add(wheel);
      }

      const clock = new THREE.Clock();

      function renderHud() {
        const status = failed ? "FAIL (ran out of fuel)" : done ? "PASS" : "IN PROGRESS";
        const ticks = Math.floor(elapsedSeconds * 60); // 60Hz equivalent
        hud.textContent =
          `Three.js Drive Demo\n` +
          `${config.fromName} -> ${config.toName}\n` +
          `Status: ${status}\n` +
          `Ticks: ${ticks}\n` +
          `Distance traveled: ${distanceTraveledMiles.toFixed(2)} / ${config.distanceMiles.toFixed(2)} miles\n` +
          `Fuel left: ${fuelLeftGallons.toFixed(2)} gal\n` +
          `Fuel range max: ${totalRangeMiles.toFixed(1)} miles`;
      }

      function step() {
        const dt = Math.min(clock.getDelta(), 0.05);

        if (!done) {
          elapsedSeconds += dt;

          const simDt = dt * config.timeScale;
          const travelMiles = speedMilesPerSecond * simDt;
          const fuelUsed = travelMiles / config.mpg;
          distanceTraveledMiles += travelMiles;
          fuelLeftGallons -= fuelUsed;

          const traveledUnits = distanceTraveledMiles * config.milesToWorldUnits;
          car.position.x = Math.min(traveledUnits, targetUnits);

          if (fuelLeftGallons < 0 || traveledUnits > maxUnitsByFuel) {
            done = true;
            failed = true;
          } else if (distanceTraveledMiles >= config.distanceMiles) {
            done = true;
          }
        }

        renderHud();
        renderer.render(scene, camera);
        requestAnimationFrame(step);
      }

      renderHud();
      step();

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
