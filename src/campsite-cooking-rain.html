<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campsite Cooking in Rain (Three.js + Rapier)</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0f1720;
        color: #f3f4f6;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
      }
      #hud {
        position: fixed;
        top: 12px;
        left: 12px;
        padding: 10px 12px;
        background: rgba(0, 0, 0, 0.58);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        line-height: 1.45;
        font-size: 13px;
        white-space: pre-line;
      }
      #rain-toggle {
        position: fixed;
        top: 12px;
        right: 12px;
        padding: 8px 16px;
        background: rgba(0, 0, 0, 0.58);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        color: #f3f4f6;
        font-family: inherit;
        font-size: 13px;
        cursor: pointer;
      }
      #rain-toggle:hover {
        background: rgba(255, 255, 255, 0.15);
      }
    </style>
  </head>
  <body>
    <div id="hud">Initializing...</div>
    <button id="rain-toggle">Rain: ON</button>
    <script type="module">
      import * as THREE from "https://unpkg.com/three@0.179.1/build/three.module.js";

      const RAPIER = await import(
        "https://cdn.jsdelivr.net/npm/@dimforge/rapier3d-compat@0.19.3/+esm"
      );
      await RAPIER.init();

      // -------------------------------------------------------
      // Entity base class
      // -------------------------------------------------------
      class Entity {
        /** @type {THREE.Scene} */       scene;
        /** @type {typeof RAPIER.World} */ world;
        /** @type {THREE.Object3D} */    mesh;
        /** @type {typeof RAPIER.RigidBody} */ body;
        /** @type {Array<typeof RAPIER.Collider>} */ colliders;

        /**
         * @param {THREE.Scene} scene
         * @param {typeof RAPIER.World} world
         */
        constructor(scene, world) {
          this.scene = scene;
          this.world = world;
          this.mesh = /** @type {THREE.Object3D} */ (/** @type {unknown} */ (null));
          this.body = /** @type {typeof RAPIER.RigidBody} */ (/** @type {unknown} */ (null));
          this.colliders = [];
        }

        /**
         * @param {typeof RAPIER.ColliderDesc} desc
         * @returns {typeof RAPIER.Collider}
         */
        addCollider(desc) {
          const c = this.world.createCollider(desc, this.body);
          this.colliders.push(c);
          return c;
        }

        /** Override in dynamic entities to sync mesh ← body. */
        sync() {}
      }

      // -------------------------------------------------------
      // Ground
      // -------------------------------------------------------
      class Ground extends Entity {
        constructor(scene, world) {
          super(scene, world);

          // visual
          const group = new THREE.Group();

          const base = new THREE.Mesh(
            new THREE.PlaneGeometry(80, 80),
            new THREE.MeshStandardMaterial({ color: 0x355e3b, roughness: 1.0 })
          );
          base.rotation.x = -Math.PI / 2;
          group.add(base);

          // wet overlay
          const wet = new THREE.Mesh(
            new THREE.PlaneGeometry(80, 80),
            new THREE.MeshStandardMaterial({
              color: 0x2a4a2a, roughness: 0.4, metalness: 0.1,
              transparent: true, opacity: 0.45,
            })
          );
          wet.rotation.x = -Math.PI / 2;
          wet.position.y = 0.003;
          group.add(wet);

          // dry patch under table
          const dry = new THREE.Mesh(
            new THREE.PlaneGeometry(5.8, 2.8),
            new THREE.MeshStandardMaterial({ color: 0x4a7a4a, roughness: 0.9 })
          );
          dry.rotation.x = -Math.PI / 2;
          dry.position.set(0, 0.005, 0);
          group.add(dry);

          this.mesh = group;
          scene.add(this.mesh);

          // physics
          this.body = world.createRigidBody(RAPIER.RigidBodyDesc.fixed());
          this.addCollider(
            RAPIER.ColliderDesc.cuboid(40, 0.01, 40).setTranslation(0, 0, 0)
          );
        }
      }

      // -------------------------------------------------------
      // Table
      // -------------------------------------------------------
      class Table extends Entity {
        static LEG_POSITIONS = [
          [-2.7, 0.45, -1.2],
          [ 2.7, 0.45, -1.2],
          [-2.7, 0.45,  1.2],
          [ 2.7, 0.45,  1.2],
        ];

        constructor(scene, world) {
          super(scene, world);
          const woodMat = new THREE.MeshStandardMaterial({
            color: 0x6b4f38, roughness: 0.85, metalness: 0.02,
          });

          const group = new THREE.Group();

          // tabletop
          const top = new THREE.Mesh(new THREE.BoxGeometry(6, 0.2, 3), woodMat);
          top.position.set(0, 1.0, 0);
          group.add(top);

          // legs
          const legGeo = new THREE.BoxGeometry(0.15, 0.9, 0.15);
          for (const [lx, ly, lz] of Table.LEG_POSITIONS) {
            const leg = new THREE.Mesh(legGeo, woodMat);
            leg.position.set(lx, ly, lz);
            group.add(leg);
          }

          this.mesh = group;
          scene.add(this.mesh);

          // physics — single fixed body, multiple colliders
          this.body = world.createRigidBody(
            RAPIER.RigidBodyDesc.fixed().setTranslation(0, 0, 0)
          );
          this.addCollider(
            RAPIER.ColliderDesc.cuboid(3, 0.1, 1.5).setTranslation(0, 1.0, 0)
          );
          for (const [lx, ly, lz] of Table.LEG_POSITIONS) {
            this.addCollider(
              RAPIER.ColliderDesc.cuboid(0.075, 0.45, 0.075).setTranslation(lx, ly, lz)
            );
          }
        }
      }

      // -------------------------------------------------------
      // Stove  (dynamic)
      // -------------------------------------------------------
      class Stove extends Entity {
        constructor(scene, world, position = [0, 1.28, 0]) {
          super(scene, world);
          const [px, py, pz] = position;

          this.mesh = new THREE.Mesh(
            new THREE.BoxGeometry(1.2, 0.32, 1.0),
            new THREE.MeshStandardMaterial({ color: 0x374151, roughness: 0.5, metalness: 0.35 })
          );
          this.mesh.position.set(px, py, pz);
          scene.add(this.mesh);

          this.body = world.createRigidBody(
            RAPIER.RigidBodyDesc.dynamic()
              .setTranslation(px, py, pz)
              .setLinearDamping(2)
              .setAngularDamping(2)
          );
          this.addCollider(
            RAPIER.ColliderDesc.cuboid(0.6, 0.16, 0.5).setFriction(0.7)
          );
        }

        sync() {
          const t = this.body.translation();
          this.mesh.position.set(t.x, t.y, t.z);
          const r = this.body.rotation();
          this.mesh.quaternion.set(r.x, r.y, r.z, r.w);
        }
      }

      // -------------------------------------------------------
      // Camper  (humanoid, fixed)
      // -------------------------------------------------------
      class Camper extends Entity {
        constructor(scene, world, position = [-4.5, 0, 0]) {
          super(scene, world);
          const [px, py, pz] = position;

          const skinMat  = new THREE.MeshStandardMaterial({ color: 0xf0c8a0, roughness: 0.7 });
          const shirtMat = new THREE.MeshStandardMaterial({ color: 0x22c55e, roughness: 0.85 });
          const pantsMat = new THREE.MeshStandardMaterial({ color: 0x1e3a5f, roughness: 0.8 });
          const bootMat  = new THREE.MeshStandardMaterial({ color: 0x3b2716, roughness: 0.9 });

          const group = new THREE.Group();
          group.position.set(px, py, pz);

          // head
          const head = new THREE.Mesh(new THREE.SphereGeometry(0.2, 12, 10), skinMat);
          head.position.y = 1.75;
          group.add(head);

          // torso
          const torso = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.6, 0.3), shirtMat);
          torso.position.y = 1.35;
          group.add(torso);

          // arms
          const armGeo = new THREE.BoxGeometry(0.15, 0.55, 0.15);
          const leftArm = new THREE.Mesh(armGeo, shirtMat);
          leftArm.position.set(-0.33, 1.35, 0);
          group.add(leftArm);
          const rightArm = new THREE.Mesh(armGeo, skinMat);
          rightArm.position.set(0.33, 1.35, 0);
          group.add(rightArm);

          // legs
          const legGeo = new THREE.BoxGeometry(0.18, 0.5, 0.18);
          const leftLeg = new THREE.Mesh(legGeo, pantsMat);
          leftLeg.position.set(-0.13, 0.8, 0);
          group.add(leftLeg);
          const rightLeg = new THREE.Mesh(legGeo, pantsMat);
          rightLeg.position.set(0.13, 0.8, 0);
          group.add(rightLeg);

          // boots
          const bootGeo = new THREE.BoxGeometry(0.2, 0.2, 0.28);
          const leftBoot = new THREE.Mesh(bootGeo, bootMat);
          leftBoot.position.set(-0.13, 0.45, 0.04);
          group.add(leftBoot);
          const rightBoot = new THREE.Mesh(bootGeo, bootMat);
          rightBoot.position.set(0.13, 0.45, 0.04);
          group.add(rightBoot);

          this.mesh = group;
          scene.add(this.mesh);

          // physics — single fixed capsule
          this.body = world.createRigidBody(
            RAPIER.RigidBodyDesc.fixed().setTranslation(px, py + 1.1, pz)
          );
          this.addCollider(RAPIER.ColliderDesc.capsule(0.55, 0.3));
        }
      }

      // -------------------------------------------------------
      // RainSystem  (particle system + raycast collision)
      // -------------------------------------------------------
      class RainSystem {
        constructor(scene, world, { count = 2000, wind = 0.012 } = {}) {
          this.world = world;
          this.count = count;
          this.wind = wind;
          this.respawn = true;

          this.positions = new Float32Array(count * 3);
          this.velocities = new Float32Array(count);
          this.rayDir = { x: 0, y: -1, z: 0 };

          for (let i = 0; i < count; i++) this._spawn(i, true);

          this.geometry = new THREE.BufferGeometry();
          this.geometry.setAttribute(
            "position", new THREE.BufferAttribute(this.positions, 3)
          );

          this.mesh = new THREE.Points(
            this.geometry,
            new THREE.PointsMaterial({
              color: 0xaaccee, size: 0.08,
              transparent: true, opacity: 0.6,
            })
          );
          scene.add(this.mesh);
        }

        _spawn(i, fullHeight = false) {
          const i3 = i * 3;
          this.positions[i3]     = (Math.random() - 0.5) * 50;
          this.positions[i3 + 1] = fullHeight
            ? Math.random() * 25 + 2
            : Math.random() * 10 + 20;
          this.positions[i3 + 2] = (Math.random() - 0.5) * 50;
          this.velocities[i] = 0.3 + Math.random() * 0.25;
        }

        resetAll() {
          for (let i = 0; i < this.count; i++) this._spawn(i, false);
          this.geometry.attributes.position.needsUpdate = true;
        }

        step() {
          const pos = this.positions;
          for (let i = 0; i < this.count; i++) {
            const i3 = i * 3;
            if (this.velocities[i] === 0) continue;

            pos[i3]     += this.wind;
            pos[i3 + 1] -= this.velocities[i];

            const x = pos[i3], y = pos[i3 + 1], z = pos[i3 + 2];

            const ray = new RAPIER.Ray({ x, y, z }, this.rayDir);
            const hit = this.world.castRay(ray, this.velocities[i], true);

            if (hit !== null) {
              if (this.respawn) {
                this._spawn(i);
              } else {
                pos[i3 + 1] = y - hit.timeOfImpact;
                this.velocities[i] = 0;
              }
              continue;
            }

            if (y < 0.05) {
              if (this.respawn) {
                this._spawn(i);
              } else {
                pos[i3 + 1] = 0.05;
                this.velocities[i] = 0;
              }
            }
          }
          this.geometry.attributes.position.needsUpdate = true;
        }

        toggle() {
          this.respawn = !this.respawn;
          if (this.respawn) this.resetAll();
          return this.respawn;
        }
      }

      // -------------------------------------------------------
      // Simulation
      // -------------------------------------------------------
      class Simulation {
        constructor() {
          this.scene = new THREE.Scene();
          this.scene.background = new THREE.Color(0x5f768e);

          this.camera = new THREE.PerspectiveCamera(
            58, window.innerWidth / window.innerHeight, 0.1, 1000
          );
          this.camera.position.set(7.5, 5.2, 8.5);
          this.camera.lookAt(0, 1.2, 0);

          this.renderer = new THREE.WebGLRenderer({ antialias: true });
          this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
          this.renderer.setSize(window.innerWidth, window.innerHeight);
          document.body.appendChild(this.renderer.domElement);

          // lights
          this.scene.add(new THREE.HemisphereLight(0xdbeafe, 0x1f2937, 1.1));
          const dir = new THREE.DirectionalLight(0xf8fafc, 1);
          dir.position.set(8, 14, 6);
          this.scene.add(dir);

          // physics
          this.world = new RAPIER.World({ x: 0, y: -9.81, z: 0 });

          // entities
          this.ground = new Ground(this.scene, this.world);
          this.table  = new Table(this.scene, this.world);
          this.stove  = new Stove(this.scene, this.world);
          this.camper = new Camper(this.scene, this.world);
          this.rain   = new RainSystem(this.scene, this.world);

          this.entities = [this.ground, this.table, this.stove, this.camper];

          this.ticks = 0;
          this.fixedDt = 1 / 60;
          this.hud = document.getElementById("hud");

          this._bindUI();
          this._bindResize();
        }

        _bindUI() {
          const btn = document.getElementById("rain-toggle");
          btn.addEventListener("click", () => {
            const on = this.rain.toggle();
            btn.textContent = on ? "Rain: ON" : "Rain: OFF";
          });
        }

        _bindResize() {
          window.addEventListener("resize", () => {
            this.camera.aspect = window.innerWidth / window.innerHeight;
            this.camera.updateProjectionMatrix();
            this.renderer.setSize(window.innerWidth, window.innerHeight);
          });
        }

        animate = () => {
          this.world.timestep = this.fixedDt;
          this.world.step();
          this.ticks++;

          for (const e of this.entities) e.sync();
          this.rain.step();

          const st = this.stove.body.translation();
          this.hud.textContent =
            `Campsite Cooking (Three.js + Rapier)\n` +
            `Ticks: ${this.ticks}\n` +
            `Stove Y: ${st.y.toFixed(3)}\n` +
            `Table: fixed | Camper: fixed | Stove: dynamic`;

          this.renderer.render(this.scene, this.camera);
          requestAnimationFrame(this.animate);
        };

        start() {
          this.animate();
        }
      }

      // -------------------------------------------------------
      // Bootstrap
      // -------------------------------------------------------
      new Simulation().start();
    </script>
  </body>
</html>
